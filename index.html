<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PDF Viewer</title>
<style>
  body {
    margin: 0;
    font-family: "Inter", system-ui, sans-serif;
    background: #0d0d0d;
    color: #eee;
    display: flex;
    height: 100vh;
  }

  .sidebar {
    width: 300px;
    background: #111;
    border-right: 1px solid #333;
    overflow-y: auto;
    padding: 10px;
  }

  .pdf-item {
    padding: 10px;
    margin-bottom: 6px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: 0.15s;
  }

  .pdf-item:hover {
    background: #222;
  }

  .pdf-item.active {
    background: #444;
  }

  .pdf-icon {
    font-size: 20px;
    margin-right: 10px;
  }

  iframe {
    flex: 1;
    border: none;
    background: #000;
  }
</style>
</head>
<body>

<div class="sidebar" id="pdf-list"></div>
<iframe id="viewer"></iframe>

<script>
fetch("data.json")
  .then(res => res.json())
  .then(list => {
    const listEl = document.getElementById("pdf-list");
    const viewer = document.getElementById("viewer");

    list.forEach((pdf, index) => {
      const item = document.createElement("div");
      item.className = "pdf-item";
      item.innerHTML = `<span class="pdf-icon">📄</span>${pdf.title}`;

      item.onclick = () => {
        viewer.src = pdf.file;
        document.querySelectorAll(".pdf-item").forEach(el => el.classList.remove("active"));
        item.classList.add("active");
      };

      listEl.appendChild(item);

      if (index === 0) item.click();
    });
  });
</script>

</body>
</html>
